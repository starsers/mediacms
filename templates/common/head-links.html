{% load static %}
		<link rel="apple-touch-icon" sizes="180x180" href="{% static "favicons/apple-touch-icon.png" %}?v={{ VERSION }}">
		<link rel="icon" type="image/png" sizes="32x32" href="{% static "favicons/favicon-32x32.png" %}?v={{ VERSION }}">
		<link rel="icon" type="image/png" sizes="16x16" href="{% static "favicons/favicon-16x16.png" %}?v={{ VERSION }}">
		<link rel="shortcut icon" href="{% static "favicons/favicon.ico" %}?v={{ VERSION }}">
		<link rel="icon" type="image/svg+xml" href="{% static "favicons/waic-favicon.svg" %}?v={{ VERSION }}">
		<link rel="manifest" href="{% static "favicons/site.webmanifest" %}?v={{ VERSION }}">
		<link rel="mask-icon" href="{% static "favicons/safari-pinned-tab.svg" %}" color="#1a56db">
		<link rel="alternate" type="application/rss+xml" title="RSS feeds" href="{{RSS_URL}}" />
		<meta name="msapplication-TileColor" content="#1a56db">
		<meta name="msapplication-config" content="{% static "favicons/browserconfig.xml" %}">
		<meta name="theme-color" content="#1a56db">

		{% if LOAD_FROM_CDN %}
		<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="preload" as="style">
		<link href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,500,500i,700,700i&display=swap" rel="preload" as="style">
		<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,500,500i,700,700i&display=swap" rel="stylesheet">
		{% else %}
		<link href="{% static "lib/material-icons/material-icons.css" %}" rel="preload" as="style">
		<link href="{% static "lib/gfonts/gfonts.css" %}" rel="preload" as="style">
		<link href="{% static "lib/material-icons/material-icons.css" %}" rel="stylesheet">
		<link href="{% static "lib/gfonts/gfonts.css" %}" rel="stylesheet">
		{% endif %}

		{% if DEVELOPMENT_MODE %}
		<link href="{{ WEBPACK_DEV_SERVER_URL }}/css/_commons.css" rel="preload" as="style">
		<link href="{{ WEBPACK_DEV_SERVER_URL }}/css/_commons.css" rel="stylesheet">
		{% else %}
		<link href="{% static "css/_commons.css" %}?v={{ VERSION }}" rel="preload" as="style">
		<link href="{% static "css/_commons.css" %}?v={{ VERSION }}" rel="stylesheet">
		{% endif %}

		<link href="{% static "css/_extra.css" %}?v={{ VERSION }}" rel="preload" as="style">
		<link href="{% static "css/_extra.css" %}?v={{ VERSION }}" rel="stylesheet">

		<link href="{% static "css/waic-theme.css" %}?v={{ VERSION }}" rel="preload" as="style">
		<link href="{% static "css/waic-theme.css" %}?v={{ VERSION }}" rel="stylesheet">

		{% for css_path in EXTRA_CSS_PATHS %}
		<link href="{{ css_path }}?v={{ VERSION }}" rel="preload" as="style">
		<link href="{{ css_path }}?v={{ VERSION }}" rel="stylesheet">
		{% endfor %}

		{% if DEVELOPMENT_MODE %}
		<link href="{{ WEBPACK_DEV_SERVER_URL }}/_commons.js" rel="preload" as="script">
		{% else %}
		<link href="{% static "js/_commons.js" %}?v={{ VERSION }}" rel="preload" as="script">
		{% endif %}
