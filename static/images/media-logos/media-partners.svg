    <text x="50" y="36" text-anchor="middle" fill="white" font-family="sans-serif" font-size="15" font-weight="700">第一财经</text>
  </g>
  <!-- 凤凰网 -->
  <g transform="translate(580,0)">
    <rect x="0" y="10" width="90" height="40" rx="6" fill="url(#g6)"/>
    <text x="45" y="36" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" font-weight="700">凤凰网</text>
  </g>
  <!-- 新浪 -->
  <g transform="translate(680,0)">
    <rect x="0" y="10" width="110" height="40" rx="6" fill="#ff8c00"/>
    <text x="55" y="36" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" font-weight="700">新浪新闻</text>
